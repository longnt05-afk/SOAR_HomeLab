detect:
  op: and
  event: NEW_PROCESS
  rules:
    - op: is windows
    - op: or
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: mimikatz
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: sekurlsa
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: lsadump
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: \\procdump.exe
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: \\procdump64.exe
          case sensitive: false

respond:
  - action: report
    name: LC - Credential Dumping Tool Detected
