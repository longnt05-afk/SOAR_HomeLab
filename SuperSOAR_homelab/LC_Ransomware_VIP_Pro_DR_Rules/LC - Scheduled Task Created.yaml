detect:
  op: and
  event: NEW_PROCESS
  rules:
    - op: is windows
    - op: or
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: \\schtasks.exe
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: \\at.exe
          case sensitive: false
    - op: contains
      path: event/COMMAND_LINE
      value: /create
      case sensitive: false

respond:
  - action: report
    name: LC - Scheduled Task Created
