detect:
  op: and
  event: NEW_PROCESS
  rules:
    - op: is windows
    - op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: \Temp\
          case sensitive: false
        - op: contains
          path: event/FILE_PATH
          value: \Downloads\
          case sensitive: false
        - op: contains
          path: event/FILE_PATH
          value: \AppData\Local\Temp\
          case sensitive: false
    - op: or
      rules:
        - op: ends with
          path: event/FILE_PATH
          value: .exe
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: .scr
          case sensitive: false
        - op: ends with
          path: event/FILE_PATH
          value: .bat
          case sensitive: false

respond:
  - action: report
    name: LC - Suspicious Process from Temp Directory
