detect:
  op: and
  event: NEW_PROCESS
  rules:
    - op: is windows
    - op: ends with
      path: event/FILE_PATH
      value: \\reg.exe
      case sensitive: false
    - op: contains
      path: event/COMMAND_LINE
      value: add
      case sensitive: false
    - op: or
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: CurrentVersion\\Run
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: CurrentVersion\\RunOnce
          case sensitive: false

respond:
  - action: report
    name: LC - Registry Persistence Detected
