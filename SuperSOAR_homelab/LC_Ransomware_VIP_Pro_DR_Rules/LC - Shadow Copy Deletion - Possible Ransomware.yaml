detect:
  op: and
  event: NEW_PROCESS
  rules:
    - op: is windows
    - op: or
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: vssadmin delete shadows
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: wmic shadowcopy delete
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: bcdedit
          case sensitive: false

respond:
  - action: report
    name: LC - Shadow Copy Deletion - Possible Ransomware
