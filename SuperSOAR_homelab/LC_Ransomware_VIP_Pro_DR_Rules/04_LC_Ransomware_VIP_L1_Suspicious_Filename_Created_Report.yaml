# LC Ransomware VIP Pro - L1 IOC Filename Created
# Purpose: file-create detection for phishing/ransomware-like filenames and double extensions.

detect:
  event: FILE_CREATE
  op: and
  rules:
    - op: is windows

    # Only common user download/staging paths.
    - op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: \Downloads\
          case sensitive: false
        - op: contains
          path: event/FILE_PATH
          value: \Desktop\
          case sensitive: false
        - op: contains
          path: event/FILE_PATH
          value: \AppData\Local\Temp\
          case sensitive: false
        - op: contains
          path: event/FILE_PATH
          value: \Users\Public\
          case sensitive: false

    # Filename IOC and masquerading patterns.
    - op: or
      rules:
        # Your IOC examples.
        - op: matches
          path: event/FILE_PATH
          file name: true
          re: '^invoice_.*\.(js|jse|vbs|vbe|hta|lnk|scr|exe)$'
          case sensitive: false
        - op: matches
          path: event/FILE_PATH
          file name: true
          re: '^payment_.*\.(js|jse|vbs|vbe|hta|lnk|scr|exe)$'
          case sensitive: false
        - op: matches
          path: event/FILE_PATH
          file name: true
          re: '^scan_.*\.exe$'
          case sensitive: false
        - op: matches
          path: event/FILE_PATH
          file name: true
          re: '^order_details.*\.pdf\.exe$'
          case sensitive: false
        - op: matches
          path: event/FILE_PATH
          file name: true
          re: '^voice_message_.*\.wav\.(js|vbs|exe|scr)$'
          case sensitive: false
        - op: matches
          path: event/FILE_PATH
          file name: true
          re: '^.*_request\.lnk$'
          case sensitive: false

        # Double extension masquerading: document/image/audio/archive + executable/script extension.
        - op: matches
          path: event/FILE_PATH
          file name: true
          re: '.*\.(pdf|doc|docx|xls|xlsx|ppt|pptx|txt|jpg|jpeg|png|gif|wav|mp3|zip|rar|7z)\.(exe|scr|js|jse|vbs|vbe|hta|bat|cmd|ps1|lnk)$'
          case sensitive: false

        # Random-looking ISO/IMG in user path: report only because this can false-positive.
        - op: matches
          path: event/FILE_PATH
          file name: true
          re: '^[a-zA-Z0-9]{6,12}\.(iso|img)$'
          case sensitive: false

respond:
  - action: report
    name: LC - Ransomware VIP L1 Suspicious Filename Created
    publish: true
    priority: 5
    metadata:
      level: medium
      tactic: TA0001,TA0005
      technique: T1036.007,T1204.002
      description: Suspicious filename IOC, double extension, or random-looking ISO/IMG created in user path. Report only.
    suppression:
      max_count: 10
      period: 1h
      is_global: false
      keys:
        - '{{ .routing.sid }}'
        - '{{ .event.FILE_PATH }}'
        - 'vip-l1-suspicious-filename-created'

  - action: add tag
    tag: lc-vip-suspicious-filename-created
    ttl: 3600
    entire_device: false
