detect:
  op: and
  event: NEW_PROCESS
  rules:
    - op: is windows
    - op: ends with
      path: event/FILE_PATH
      value: \\mshta.exe
      case sensitive: false
    - op: or
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: http
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: javascript
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: vbscript
          case sensitive: false

respond:
  - action: report
    name: LC - Mshta Execution
