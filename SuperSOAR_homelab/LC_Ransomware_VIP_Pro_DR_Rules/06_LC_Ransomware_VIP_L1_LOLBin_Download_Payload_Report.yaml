# LC Ransomware VIP Pro - L1 LOLBin Download
# Purpose: certutil/bitsadmin/curl/wget downloading dangerous payload to user-writable path.

detect:
  event: NEW_PROCESS
  op: and
  rules:
    - op: is windows

    # Trusted/LOLBins used for download.
    - op: or
      rules:
        - op: is
          path: event/FILE_PATH
          value: certutil.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: bitsadmin.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: curl.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: wget.exe
          file name: true
          case sensitive: false

    # Must contain an external URL.
    - op: matches
      path: event/COMMAND_LINE
      re: 'https?://[^\s"'']+'
      case sensitive: false

    # Must show download behavior and dangerous target path/extension.
    - op: or
      rules:
        - op: contains
          path: event/COMMAND_LINE
          value: -urlcache
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: -split
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: /transfer
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: -o
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: -O
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: --output
          case sensitive: false

    - op: matches
      path: event/COMMAND_LINE
      re: '.*(\\Users\\[^\\]+\\(Downloads|Desktop|AppData)|\\Users\\Public|\\Temp\\).*\.(exe|dll|js|jse|vbs|vbe|hta|ps1|bat|cmd|lnk|scr|iso|img)(\s|$|"|'').*'
      case sensitive: false

respond:
  - action: report
    name: LC - Ransomware VIP L1 LOLBin Download Payload Report
    publish: true
    priority: 4
    metadata:
      level: medium
      tactic: TA0011
      technique: T1105,T1218
      description: certutil/bitsadmin/curl/wget downloading dangerous payload into user-writable path. Report only.
    suppression:
      max_count: 5
      period: 1h
      is_global: false
      keys:
        - "{{ .routing.sid }}"
        - "{{ .event.FILE_PATH }}"
        - "{{ .event.COMMAND_LINE }}"
        - "vip-l1-lolbin-download-payload"

  - action: add tag
    tag: lc-vip-lolbin-download-watch
    ttl: 3600
    entire_device: false
