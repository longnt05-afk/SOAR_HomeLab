# LC Ransomware VIP Pro - L1
# Purpose: broad suspicious execution from user-writable locations. Report only, no kill.

detect:
  event: NEW_PROCESS
  op: and
  rules:
    - op: is windows

    # Only focus on user-writable or common staging locations.
    - op: or
      rules:
        - op: contains
          path: event/FILE_PATH
          value: \Users\
          case sensitive: false
        - op: contains
          path: event/FILE_PATH
          value: \ProgramData\
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: \Users\
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: \Temp\
          case sensitive: false

    # Suspicious interpreter / LOLBin / masquerading signals.
    - op: or
      rules:
        # Suspicious command-line patterns.
        - op: contains
          path: event/COMMAND_LINE
          value: -enc
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: encodedcommand
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: frombase64string
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: downloadstring
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: downloadfile
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: invoke-webrequest
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: invoke-expression
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: bypass
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: hidden
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: http://
          case sensitive: false
        - op: contains
          path: event/COMMAND_LINE
          value: https://
          case sensitive: false

        # Interpreters / script loaders.
        - op: is
          path: event/FILE_PATH
          value: powershell.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: pwsh.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: wscript.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: cscript.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: mshta.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: rundll32.exe
          file name: true
          case sensitive: false
        - op: is
          path: event/FILE_PATH
          value: regsvr32.exe
          file name: true
          case sensitive: false

        # Windows system-name masquerading from user locations.
        - op: matches
          path: event/FILE_PATH
          re: '.*\\(svchost|lsass|winlogon|csrss|services|spoolsv|explorer)\.exe$'
          case sensitive: false

respond:
  - action: report
    name: LC - Ransomware VIP L1 User Writable Suspicious Execution
    publish: true
    priority: 5
    metadata:
      level: medium
      tactic: TA0002,TA0005
      technique: T1059,T1218,T1036
      description: Suspicious execution or masquerading from user-writable paths. Report only, no blocking.
    suppression:
      max_count: 5
      period: 1h
      is_global: false
      keys:
        - '{{ .routing.sid }}'
        - '{{ .event.FILE_PATH }}'
        - 'vip-l1-user-writable-exec'

  - action: add tag
    tag: lc-vip-l1-watch
    ttl: 3600
    entire_device: false
